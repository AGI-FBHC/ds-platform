# Docker жЃеуй▓
# тљ»тіе: docker compose up -d --build
# тЂюТГб: docker compose down
# ТЋЈТёЪжЁЇуй«ТћЙтюе docker/.env СИГ

version: '3.8'
services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: ds-backend
    ports:
      - "8000:8000"                     # тљјуФ» API
    volumes:
      - /home/ubuntu/ds-platform/storage:/app/storage
      - ./logs:/app/logs
    environment:
      # MySQL
      - MYSQL_HOST=${MYSQL_HOST:-10.3.0.9}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=ds_platform
      # Storage
      - STORAGE_ROOT=/app/storage/datasets
      # JWT
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_DAYS=7
      # CORS
      - BACKEND_CORS_ORIGINS=["http://localhost:5173","http://localhost:5174","http://localhost:3000","https://dataset.agi-fbhc.com","http://dataset.agi-fbhc.com"]
      # DeepSeek
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      # Aliyun
      - ALIYUN_ACCESS_KEY_ID=${ALIYUN_ACCESS_KEY_ID}
      - ALIYUN_ACCESS_KEY_SECRET=${ALIYUN_ACCESS_KEY_SECRET}
      - ALIYUN_IMAGESEG_ENDPOINT=${ALIYUN_IMAGESEG_ENDPOINT:-imageseg.cn-shanghai.aliyuncs.com}
      - ALIYUN_IMAGESEG_REGION=${ALIYUN_IMAGESEG_REGION:-cn-shanghai}
    restart: unless-stopped
    networks:
      - ds-net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ds-frontend
    ports:
      - "8080:80"                       # тЅЇуФ»жЮЎТђЂуФЎуѓ╣
    restart: unless-stopped
    networks:
      - ds-net

networks:
  ds-net:
    driver: bridge
