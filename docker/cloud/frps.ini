# 云服务器 frps 配置
# 路径: /opt/frp/frps.ini

[common]
# frp 控制通道端口，frpc 通过此端口连接 frps
bind_port = 7000

# 权限模式（开启后 frpc 才能使用 remote_port）
privilege_mode = true

# 认证 token（与 frpc.ini 必须一致）
token = 替换为你的随机密码

# HTTP 穿透（可选，启用后可通过 http://公网IP:8080 访问实验室服务）
# vhost_http_port = 8080

# 日志
log_file = /var/log/frps.log
log_level = info
log_max_days = 3

# 连接池（提升并发）
max_pool_count = 10
