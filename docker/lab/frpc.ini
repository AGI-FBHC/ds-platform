# 实验室服务器 frpc 配置
# 路径: /opt/frp/frpc.ini

[common]
# 云服务器公网 IP
server_addr = 你的云服务器公网IP

# frps 控制端口（与 frps.ini bind_port 一致）
server_port = 7000

# 认证 token（与 frps.ini privilege_token 一致）
token = 替换为你的随机密码

# 心跳保活
pool_count = 2
transport_heartbeat_interval = 30
transport_heartbeat_timeout = 90

# 日志
log_file = /var/log/frpc.log
log_level = info
log_max_days = 3

# ============ 服务映射 ============

[backend]
type = tcp
local_ip = 127.0.0.1
local_port = 8000
# 访问云服务器 :8000 → 转发到实验室后端 :8000
remote_port = 8000
# 启用压缩（节省带宽）
use_compression = true
