# 云服务器 Nginx 配置
# 路径: /etc/nginx/sites-available/default
# 或: /etc/nginx/conf.d/ds-platform.conf

# 前端静态文件根目录（Vite build 后）
set $frontend_root /var/www/ds-platform/dist;

# ============ HTTP 自动跳转 HTTPS（可选）============
